
services:
  db:
    image: postgres:15-alpine
    container_name: media_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: media_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media_platform_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/media_platform
      - SECRET_KEY=YOUR_SUPER_SECRET_KEY_FOR_JWT_SIGNING_CHANGEME
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: media_platform_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
